---
# One active pod owns the RWO catalog/output volume. Recreate prevents two adapters from opening
# the same SQLite state directory during a rollout.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: camera-adapter-data
  labels:
    app.kubernetes.io/name: camera-adapter
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: camera-adapter
  labels:
    app.kubernetes.io/name: camera-adapter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: camera-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: camera-adapter
    spec:
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60
      # Label exactly the camera-connected node. Change this selector to match the cluster's
      # authoritative node label; do not remove placement policy for a physical camera deployment.
      nodeSelector:
        camera.edgecommons.io/network: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: camera-adapter
          # Replace with a registry reference pinned by immutable digest.
          image: ghcr.io/edgecommons/camera-adapter:REPLACE_WITH_REVIEWED_DIGEST
          imagePullPolicy: IfNotPresent
          args: ["--platform", "KUBERNETES", "-c", "CONFIGMAP"]
          ports:
            - name: health
              containerPort: 8081
          startupProbe:
            httpGet: { path: /startupz, port: health }
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet: { path: /livez, port: health }
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/edgecommons
              readOnly: true
            - name: data
              mountPath: /var/lib/edgecommons/camera-adapter
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: camera-adapter-config
        - name: data
          persistentVolumeClaim:
            claimName: camera-adapter-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
