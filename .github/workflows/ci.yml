name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo (build / test / clippy).
    #
    # No credentials: `edgecommons` is a PUBLIC repository now, so the pinned git dependency needs no
    # token. The `insteadOf` rewriting this used to do was not merely redundant once the dependency
    # went public -- with an empty secret it rewrites the URL to `x-access-token:@github.com` and
    # breaks a fetch that would otherwise have just worked.
    #
    # Default features only (standalone + onvif) — those are pure Rust. `rtsp` needs GStreamer and
    # `genicam` needs Aravis, both system libraries; they are compiled and exercised in the
    # simulator-backed containers (simulators/rtsp_validation.Dockerfile,
    # simulators/native_all_validation.Dockerfile), not here.
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: RUST
    secrets: inherit

  coverage:
    # The reusable workflow does build/test/clippy and nothing else — its own header says to
    # specialize per component "as real CI needs surface (coverage gates, ...)". This repo shipped
    # with no CI at all, and it is not a coincidence that it is the component that accumulated a
    # retention subsystem that was never called, an observability module with zero call sites, and a
    # capacity harness that could not generate its own advertised load. Nothing was gating it.
    #
    # Two gates, and the second is the one that matters:
    #
    #   bundle  90% lines — where the crate honestly is today (90.12%). A ratchet, not an
    #           aspiration: raise it as real tests land, never lower it to pass.
    #
    #   diff    95% of CHANGED lines — the lever. A bundle average is a LAGGING indicator that a
    #           large under-tested change hides inside; that is exactly how ~7.5k lines of
    #           under-tested core code nearly merged upstream. The diff gate asks the question that
    #           matters on day one: is the code THIS PR changed tested?
    #
    # NOTE: diff-cover must run from the repo ROOT. Run it from a subdirectory and the source paths
    # stop matching what `git diff` reports, it announces "no lines with coverage information", and
    # the gate passes having checked nothing.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover needs the merge base with the base branch.
          fetch-depth: 0

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      # Collect once, then report twice from the same profile data. Folding the gate into a
      # `--cobertura --output-path` run suppresses llvm-cov's summary table, so a failing run tells
      # you only THAT it failed, never by how much. A gate that will not tell you the number is a
      # bad gate.
      - name: Collect coverage
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo llvm-cov --no-report

      - name: Coverage summary + 90% line gate
        run: cargo llvm-cov report --summary-only --fail-under-lines 90

      - name: Cobertura report for the diff gate
        if: always()
        run: cargo llvm-cov report --cobertura --output-path target/cobertura.xml

      - name: Diff coverage gate (95% of changed lines)
        run: |
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          pip install diff-cover
          diff-cover target/cobertura.xml --compare-branch=origin/main --fail-under=95

  msrv:
    # Cargo.toml promises rust-version = "1.85". Nothing checked it. The `ci` and `coverage` jobs
    # build on `stable`, and a developer's toolchain is newer still, so any feature stabilised after
    # 1.85 compiles everywhere a human looks and breaks only for whoever actually holds us to the
    # MSRV. A let-chain -- stable since 1.88 -- got as far as a commit on exactly that blind spot.
    #
    # A plain `cargo check` on the pinned toolchain is enough; this is about the language level, not
    # about lints.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install the MSRV toolchain
        run: rustup toolchain install 1.85 --profile minimal


      # `--locked` against the committed `Cargo.lock`, which records the pinned GIT source (it is
      # regenerated on a fresh clone with the local `.cargo` `[patch]` inactive, so it never carries a
      # path override, and the MSRV-aware resolver held every dependency to a 1.85-compatible version).
      # CI has no `.cargo` override, so the lock resolves the pinned rev reproducibly.
      - name: Check on the declared MSRV
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo +1.85 check --locked --all-targets

  rtsp-backend:
    # The `rtsp` (GStreamer) backend was compiled by NOTHING. The jobs above build default features
    # only (standalone + onvif), and the backend cannot build on the Windows dev box for want of
    # pkg-config and GStreamer. So the entire RTSP capture path -- the decoder, the access-unit
    # assembler, the session worker -- was never compiled, never linted and never tested by any
    # automated gate in this repo or on any machine a developer routinely runs.
    #
    # That is how the RTSP decode stage came to be bounded by a hardcoded four-permit process-global
    # semaphore while the component advertised 32 concurrent captures: nothing ever looked at it.
    #
    # No camera is needed here. The live-fixture tests are #[ignore]d and run against MediaMTX in
    # simulators/run-rtsp-native-coverage.ps1; this job compiles the code, lints it, and runs the unit
    # tests, which is precisely the coverage that was missing.
    #
    # `genicam` is still ungated. It needs native Aravis >= 0.8.36 (native/aravis-scoped/build.rs
    # enforces this for interface-scoped discovery) and the distributions ship 0.8.26 (Debian
    # bookworm) / 0.8.31 (Ubuntu 24.04), so gating it means building Aravis from source in CI. That
    # is a separate piece of work, and pretending otherwise by dropping the feature from the command
    # line would leave a green check over an uncompiled backend -- exactly the failure above.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # The -dev packages are enough to COMPILE the rtsp backend and nothing more. They ship no
      # elements, so the decode pipeline this job exists to validate could not even be CONSTRUCTED
      # here -- h264parse lives in plugins-bad, avdec_h264 in gst-libav, and videoconvert/appsrc/
      # appsink in plugins-base. Nobody noticed, because until the image-fidelity tests arrived no
      # test had ever built a decoder: the job named `rtsp-backend` was proving that the RTSP
      # backend COMPILES, not that it works. These are the four runtime packages the known-good
      # simulators/rtsp_validation.Dockerfile image installs.
      - name: Install GStreamer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-tools gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-libav

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy


      - name: Clippy (rtsp backend)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo clippy --all-targets \
            --no-default-features --features standalone,onvif,rtsp -- -D warnings

      - name: Test (rtsp backend)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          cargo test --lib \
            --no-default-features --features standalone,onvif,rtsp

  image:
    # The Dockerfile was built by NOTHING. Not by CI, not by any script -- the only automated docker
    # builds in this repo are the simulator validation images, which are different files. This job
    # builds the shipped image so it cannot silently rot.
    #
    # It builds both targets from a clean checkout `--locked` against the committed `Cargo.lock` (which
    # records the pinned git source; the image context carries no `.cargo` override) and runs the
    # binary it produced -- compiling is not the same as producing a working image, and the RTSP target
    # exists precisely to carry a GStreamer runtime the ONVIF one does not.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # A clean checkout carries the committed `Cargo.lock`; the Dockerfile copies it and builds
      # `--locked` for a reproducible image. This job proves the image builds from a clean clone.
      - name: Build the default image (onvif)
        run: docker build --target onvif -t camera-adapter:onvif .

      - name: Build the rtsp image
        run: docker build --target rtsp -t camera-adapter:rtsp .

      # The entrypoint refuses an incomplete command line, which is enough to prove the binary is
      # present, dynamically links, and parses its own CLI inside the image.
      - name: The images run
        run: |
          for image in camera-adapter:onvif camera-adapter:rtsp; do
            output="$(docker run --rm "$image" --platform HOST 2>&1 || true)"
            case "$output" in
              *"--transport MQTT"*) echo "$image: runs" ;;
              *) echo "$image: did not start as expected:"; echo "$output"; exit 1 ;;
            esac
          done

      # The RTSP image must carry the plugins the decode pipeline actually loads; the ONVIF image must
      # carry none at all. Assert both halves -- an rtsp image whose plugins are missing is exactly the
      # gap that shipped a decoder nothing could construct, and a fattened base image is a regression in
      # the other direction.
      #
      # Assert the plugin LIBRARIES, not `gst-inspect-1.0`. That tool ships in gstreamer1.0-tools, a
      # development package with no business in a runtime image -- requiring it here would mean fattening
      # the shipped image to satisfy its own test. (The first cut of this step did exactly that, and
      # reported a missing h264parse when the plugin was present and only the TOOL was absent.)
      - name: The rtsp image carries the GStreamer decode plugins, and the onvif image carries none
        run: |
          docker run --rm --entrypoint sh camera-adapter:rtsp -c '
            set -e
            dir="$(dirname "$(find /usr/lib -name libgstapp.so -print -quit)")"
            for plugin in libgstvideoparsersbad.so libgstlibav.so libgstvideoconvertscale.so libgstapp.so; do
              test -e "$dir/$plugin" || { echo "rtsp image is missing $plugin"; exit 1; }
            done
            echo "rtsp: h264parse, avdec_h264, videoconvert and appsrc/appsink plugins present"'
          if docker run --rm --entrypoint sh camera-adapter:onvif -c 'find /usr/lib -type d -name gstreamer-1.0 | grep -q .'; then
            echo "onvif image unexpectedly carries a GStreamer plugin tree"; exit 1
          fi
          echo "onvif: no GStreamer runtime, as intended"
